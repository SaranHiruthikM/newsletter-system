global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "newsletter-api"
    static_configs:
      - targets: ["host.docker.internal:8080"]
    metrics_path: "/api/v1/metrics"

  - job_name: "newsletter-worker"
    static_configs:
      - targets: ["host.docker.internal:3002"]
    metrics_path: "/metrics"
